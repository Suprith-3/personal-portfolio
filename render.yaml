services:
  - type: web
    name: personal-portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SENDER_EMAIL
        sync: false # Set this in Render Dashboard -> Env Variables
      - key: EMAIL_PASSWORD
        sync: false # Set this in Render Dashboard -> Env Variables
      - key: RECEIVER_EMAIL
        sync: false # Set this in Render Dashboard -> Env Variables
